name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test tests/tokenops-math.test.js
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test

  deploy:
    needs: audit
    # Deploys are manual (local wrangler) until a Pages-scoped API token is
    # added to repo secrets. Flip the CF_DEPLOY repo variable to 'enabled'
    # after adding CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets.
    # Skipped (not failed) runs send no failure emails.
    if: ${{ vars.CF_DEPLOY == 'enabled' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=calc-nixfred-com --branch=main
